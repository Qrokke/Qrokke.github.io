# To add a paper, append one block. Only `authors`, `title`,
# `venue`, `year`, and `category` are required.
#
#   category:    journal | international | domestic | poster | misc
#   status:      (optional) e.g. "to appear", "conditionally accepted",
#                "under review". Omit once published.
#   doi:         (optional) bare DOI only, e.g. 10.20965/jrm.2026.pXXXX
#                A https://doi.org/... link is generated automatically.
#   url:         (optional) any other link (publisher page, arXiv, ...)
#   pdf:         (optional) path or URL to an author-version PDF
#   in_japanese: true  -> "(in Japanese)" is appended automatically
#   note:        (optional) free text, e.g. "Best Poster Award"
#
# Entries are sorted by year (descending) within each category.
# ============================================================

