<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines | truncate: 160 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="wrap">
      <a class="site-name" href="{{ '/' | relative_url }}">
        <span class="site-name-main">{{ site.title }}</span>
        <span class="site-name-sub">{{ site.subtitle }}</span>
      </a>
      <nav class="site-nav" aria-label="Main">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>About</a>
        <a href="{{ '/publications/' | relative_url }}" {% if page.url contains '/publications' %}aria-current="page"{% endif %}>Publications</a>
        <a href="{{ '/diary/' | relative_url }}" {% if page.url contains '/diary' %}aria-current="page"{% endif %}>Diary</a>
      </nav>
    </div>
    <div class="squarewave" aria-hidden="true"></div>
  </header>

  <main class="wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="squarewave squarewave--flip" aria-hidden="true"></div>
    <div class="wrap">
      <p>
        © {{ 'now' | date: '%Y' }} {{ site.author.name }} ·
        {{ site.author.affiliation }}<br>
        ORCID:
        <a href="https://orcid.org/{{ site.author.orcid }}" rel="noopener">{{ site.author.orcid }}</a>
        · Contact: <span class="mono">{{ site.author.email_display }}</span>
      </p>
    </div>
  </footer>

</body>
</html>
